<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Скалодром — Таблица лидеров</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

    :root {
      --bg: #0a0a12;
      --panel: #12121e;
      --accent1: #00c2ff;
      --accent2: #7c3aed;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --green: #22c55e;
      --text: #f0f0f0;
      --muted: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,194,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(124,58,237,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      font-size: 48px;
      filter: drop-shadow(0 0 12px rgba(0,194,255,0.6));
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .month-badge {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      padding: 8px 24px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .update-info {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
    }

    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    /* Main grid */
    .tracks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      padding: 24px 48px 24px;
      height: calc(100vh - 120px);
    }

    .track-panel {
      background: var(--panel);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .track-header {
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .track-1 .track-header { background: linear-gradient(90deg, rgba(0,194,255,0.15), transparent); border-bottom: 2px solid var(--accent1); }
    .track-2 .track-header { background: linear-gradient(90deg, rgba(124,58,237,0.15), transparent); border-bottom: 2px solid var(--accent2); }

    .track-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      line-height: 1;
    }

    .track-1 .track-number { color: var(--accent1); }
    .track-2 .track-number { color: var(--accent2); }

    .track-title { font-size: 20px; font-weight: 700; }
    .track-count { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* Table */
    .leaderboard {
      flex: 1;
      overflow: hidden;
      padding: 12px 0;
    }

    .row {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      align-items: center;
      padding: 10px 28px;
      border-radius: 10px;
      margin: 0 12px 4px;
      transition: all 0.4s ease;
    }

    .row:hover { background: rgba(255,255,255,0.03); }

    .row.top1 { background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.2); }
    .row.top2 { background: rgba(192,192,192,0.06); border: 1px solid rgba(192,192,192,0.15); }
    .row.top3 { background: rgba(205,127,50,0.06); border: 1px solid rgba(205,127,50,0.12); }

    .rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      color: var(--muted);
    }

    .row.top1 .rank { color: var(--gold); font-size: 34px; }
    .row.top2 .rank { color: var(--silver); font-size: 32px; }
    .row.top3 .rank { color: var(--bronze); font-size: 31px; }

    .medal { font-size: 26px; }

    .name { font-size: 18px; font-weight: 600; }
    .row.top1 .name { font-size: 21px; color: var(--gold); }
    .row.top2 .name { font-size: 19px; color: var(--silver); }
    .row.top3 .name { font-size: 19px; color: var(--bronze); }

    .date { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 0.3px; }
    .row.top1 .date { color: rgba(255,215,0,0.6); }
    .row.top2 .date { color: rgba(192,192,192,0.6); }
    .row.top3 .date { color: rgba(205,127,50,0.6); }

    .time-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      padding: 4px 16px;
      border-radius: 8px;
      letter-spacing: 2px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .row.top1 .time-badge { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.3); color: var(--gold); font-size: 30px; }
    .row.top2 .time-badge { background: rgba(192,192,192,0.1); border-color: rgba(192,192,192,0.25); color: var(--silver); }
    .row.top3 .time-badge { background: rgba(205,127,50,0.1); border-color: rgba(205,127,50,0.2); color: var(--bronze); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 12px;
    }

    .empty-icon { font-size: 56px; opacity: 0.3; }
    .empty-text { font-size: 16px; }

    /* Footer ticker */
    .ticker-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10,10,18,0.9);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 10px 0;
      overflow: hidden;
    }

    .ticker {
      display: flex;
      gap: 60px;
      animation: ticker 30s linear infinite;
      white-space: nowrap;
    }

    @keyframes ticker {
      from { transform: translateX(100vw); }
      to { transform: translateX(-200%); }
    }

    .ticker-item {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ticker-item strong { color: var(--text); }

    /* New entry animation */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .new-entry { animation: slideIn 0.5s ease forwards; }

    .error-banner {
      position: fixed;
      top: 20px; left: 5%; right: 5%;
      background: rgba(180,20,20,0.97);
      padding: 16px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      display: none;
      z-index: 999;
      color: #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<div class="error-banner" id="errorBanner">⚠️ Ошибка загрузки данных</div>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🧗</div>
    <div>
      <div class="logo-text">Покори высоту</div>
      <div class="logo-sub">Таблица лидеров • Скоростное восхождение</div>
    </div>
  </div>

  <div class="month-badge" id="monthBadge">Загрузка...</div>

  <div class="update-info">
    <div><span class="live-dot"></span>Обновляется в реальном времени</div>
    <div id="lastUpdate" style="margin-top:4px">—</div>
  </div>
</header>

<main class="tracks-grid">
  <div class="track-panel track-1" id="panel1">
    <div class="track-header">
      <div class="track-number">1</div>
      <div>
        <div class="track-title">Трасса 1</div>
        <div class="track-count" id="count1">Загрузка...</div>
      </div>
    </div>
    <div class="leaderboard" id="board1">
      <div class="empty-state"><div class="empty-icon">⏳</div></div>
    </div>
  </div>

  <div class="track-panel track-2" id="panel2">
    <div class="track-header">
      <div class="track-number">2</div>
      <div>
        <div class="track-title">Трасса 2</div>
        <div class="track-count" id="count2">Загрузка...</div>
      </div>
    </div>
    <div class="leaderboard" id="board2">
      <div class="empty-state"><div class="empty-icon">⏳</div></div>
    </div>
  </div>
</main>

<div class="ticker-wrap">
  <div class="ticker" id="ticker">
    <span class="ticker-item">🏆 Загружаем последние результаты...</span>
  </div>
</div>

<script>
  // ═══ КОНФИГУРАЦИЯ ═══════════════════════════════════════════════════
  const SPREADSHEET_ID = "1p0xuq0ezPj2FFDcLaaQVlSkROdMIjipY48gePkJbPFc";
  const REFRESH_INTERVAL = 30000; // обновление каждые 30 секунд
  const TOP_LIMIT = 12;
  // ════════════════════════════════════════════════════════════════════

  const MONTHS = {
    "January":"Январь","February":"Февраль","March":"Март","April":"Апрель",
    "May":"Май","June":"Июнь","July":"Июль","August":"Август",
    "September":"Сентябрь","October":"Октябрь","November":"Ноябрь","December":"Декабрь"
  };

  function getMonthName() {
    const now = new Date();
    const eng = now.toLocaleString('en-US', {month:'long'});
    const year = now.getFullYear();
    return `${eng} ${year}`;
  }

  function getRuMonth() {
    const now = new Date();
    const eng = now.toLocaleString('en-US', {month:'long'});
    const year = now.getFullYear();
    return `${MONTHS[eng] || eng} ${year}`;
  }

  async function fetchSheet() {
    const monthName = encodeURIComponent(getMonthName());
    // headers=1 — говорим Google что первая строка это заголовки колонок
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${monthName}`;
    const res = await fetch(url);
    const text = await res.text();
    // Гибкий парсинг — ищем начало JSON независимо от длины обёртки
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}') + 1;
    return JSON.parse(text.substring(start, end));
  }

  function parseRows(json) {
    const cols = json.table.cols.map(c => c.label || c.id);
    const rows = (json.table.rows || []).map(r => {
      const obj = {};
      r.c.forEach((cell, i) => {
        // gviz может вернуть дату как объект — берём форматированное (f) или сырое (v)
        obj[cols[i]] = cell?.f ?? cell?.v ?? "";
      });
      return obj;
    });
    // Убираем пустые строки и случайно попавший заголовок
    return rows.filter(r => r["ФИО"] && String(r["ФИО"]).trim() !== "" && r["ФИО"] !== "ФИО");
  }

  function getTimeSec(r) {
    const raw = r["Время (сек)"];
    return (raw !== "" && raw !== undefined) ? parseFloat(raw) : Infinity;
  }

  function formatTime(r) {
    return r["Время (формат)"] || (r["Время (сек)"] ? r["Время (сек)"] + " сек" : "—");
  }

  function formatDate(r) {
    const d = r["Дата"];
    if (!d) return "—";
    return String(d).split(" ")[0];
  }

  function sortByTime(rows) {
    return [...rows].sort((a, b) => getTimeSec(a) - getTimeSec(b));
  }

  function renderBoard(boardId, countId, rows, track) {
    const board = document.getElementById(boardId);
    const countEl = document.getElementById(countId);

    // Бот пишет трассу числом — сравниваем как строки на всякий случай
    const filtered = rows.filter(r => String(r["Трасса"]).trim() === String(track));
    const sorted = sortByTime(filtered);
    const top = sorted.slice(0, TOP_LIMIT);

    const n = filtered.length;
    const word = n === 1 ? 'участник' : n < 5 ? 'участника' : 'участников';
    countEl.textContent = `${n} ${word}`;

    if (top.length === 0) {
      board.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🧗</div>
          <div class="empty-text">Пока нет результатов — будь первым!</div>
        </div>`;
      return;
    }

    const medals = ["🥇","🥈","🥉"];
    const classes = ["top1","top2","top3"];

    board.innerHTML = top.map((r, i) => {
      const cls = classes[i] || "";
      const rank = medals[i] ? `<span class="medal">${medals[i]}</span>` : `<span class="rank">${i+1}</span>`;
      return `
        <div class="row ${cls} new-entry" style="animation-delay:${i*40}ms">
          ${rank}
          <div>
            <div class="name">${r["ФИО"]}</div>
            <div class="date">📅 ${formatDate(r)}</div>
          </div>
          <div class="time-badge">${formatTime(r)}</div>
        </div>`;
    }).join("");
  }

  function updateTicker(rows) {
    const recent = [...rows].reverse().slice(0, 20);
    if (recent.length === 0) return;
    const items = recent.map(r =>
      `<span class="ticker-item">🧗 <strong>${r["ФИО"]}</strong> • Трасса ${r["Трасса"]} • ⏱ ${formatTime(r)}</span>`
    ).join("");
    document.getElementById("ticker").innerHTML = items + items;
  }

  async function refresh() {
    try {
      document.getElementById("errorBanner").style.display = "none";
      const json = await fetchSheet();
      const rows = parseRows(json);

      renderBoard("board1", "count1", rows, 1);
      renderBoard("board2", "count2", rows, 2);
      updateTicker(rows);

      document.getElementById("monthBadge").textContent = getRuMonth();
      document.getElementById("lastUpdate").textContent =
        "Обновлено: " + new Date().toLocaleTimeString("ru-RU");
    } catch (e) {
      console.error("Ошибка загрузки:", e);
      let msg = "⚠️ Ошибка загрузки: " + e.message;
      if (e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
        msg += " → Таблица закрыта. Откройте доступ: Настройки доступа → Все у кого есть ссылка → Читатель";
      }
      document.getElementById("errorBanner").style.display = "block";
      document.getElementById("errorBanner").textContent = msg;
    }
  }

  // Первый запуск
  refresh();
  // Автообновление
  setInterval(refresh, REFRESH_INTERVAL);
</script>
</body>
</html>
